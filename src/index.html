<!DOCTYPE html>
<html lang="en" class="theme-current">

<head>
  <meta charset="utf-8">
  <title>Safesmart - Ultimate Protection (Angular)</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="favicon.ico">

  <!-- Ported from React Project -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
    rel="stylesheet">

  <style>
    /* Theme Variable Definitions */
    .theme-current {
      --brand-darkest: #011f4b;
      --brand-dark: #03396c;
      --brand-primary: #005b96;
      --brand-light: #6497b1;
      --brand-lightest: #b3cde0;
      --bg-body: #ffffff;
      --bg-alt: #f9fafb;
      --bg-nav: #ffffff;
      --bg-footer: #011f4b;
      --text-nav: #011f4b;
      --text-main: #1f2937;
      --text-muted: #6b7280;
      --nav-border: #f3f4f6;
      --footer-text: #ffffff;
    }

    .theme-dark {
      --brand-darkest: #0a0a0a;
      --brand-dark: #1a1a1a;
      --brand-primary: #3b82f6;
      --brand-light: #333333;
      --brand-lightest: #525252;
      --bg-body: #121212;
      --bg-alt: #1a1a1a;
      --bg-nav: #0a0a0a;
      --bg-footer: #0a0a0a;
      --text-nav: #ffffff;
      --text-main: #e5e7eb;
      --text-muted: #9ca3af;
      --nav-border: #262626;
      --footer-text: #9ca3af;
    }

    .theme-bluish {
      --brand-darkest: #ffffff;
      --brand-dark: #1e40af;
      --brand-primary: #60a5fa;
      --brand-light: #93c5fd;
      --brand-lightest: #dbeafe;
      --bg-body: #f8fafc;
      --bg-alt: #eff6ff;
      --bg-nav: #1e3a8a;
      --bg-footer: #1e3a8a;
      --text-nav: #ffffff;
      --text-main: #1e293b;
      --text-muted: #64748b;
      --nav-border: #2563eb;
      --footer-text: #ffffff;
    }

    * {
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
      box-sizing: border-box;
    }

    body {
      background-color: var(--bg-body);
      color: var(--text-main);
      font-family: 'Inter', sans-serif;
    }

    /* Skeleton Shimmer Animation */
    @keyframes shimmer {
      0% { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }

    .skeleton {
      background: linear-gradient(90deg, #f1f5f9 25%, #e2e8f0 50%, #f1f5f9 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 0.5rem;
    }

    .skeleton-dark {
      background: linear-gradient(90deg, #1e293b 25%, #334155 50%, #1e293b 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
    }

    /* Transitions & Animations */
    .transition-all,
    .transition {
      transition-duration: 300ms !important;
      transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1) !important;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .animate-reveal {
      animation: fadeUp 0.6s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }

    /* Hover Lift Utility */
    .hover-lift {
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .hover-lift:hover {
      transform: translateY(-4px);
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
    }

    /* Glassmorphism */
    .glass {
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.3);
    }

    .glass-dark {
      background: rgba(15, 23, 42, 0.8);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
  </style>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
          },
          colors: {
            brand: {
              darkest: 'var(--brand-darkest)',
              dark: 'var(--brand-dark)',
              primary: 'var(--brand-primary)',
              light: 'var(--brand-light)',
              lightest: 'var(--brand-lightest)',
              body: 'var(--bg-body)',
              alt: 'var(--bg-alt)',
              nav: 'var(--bg-nav)',
              footer: 'var(--bg-footer)',
              navText: 'var(--text-nav)',
              mainText: 'var(--text-main)',
              mutedText: 'var(--text-muted)',
              footerText: 'var(--footer-text)',
              navBorder: 'var(--nav-border)'
            }
          }
        }
      }
    }
  </script>
</head>

<body class="overflow-x-hidden selection:bg-brand-primary selection:text-white">
  <app-root></app-root>
</body>

</html>
